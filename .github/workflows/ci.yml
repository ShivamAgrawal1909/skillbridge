name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: skillbridge
          POSTGRES_PASSWORD: skillbridge
          POSTGRES_DB: skillbridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: install deps
        run: pip install -r requirements.txt
      - name: run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://skillbridge:skillbridge@localhost:5432/skillbridge_test  
          SECRET_KEY: test-secret-key-not-for-production
        run: alembic upgrade head

      - name: seed database
        env:
          DATABASE_URL: postgresql+asyncpg://skillbridge:skillbridge@localhost:5432/skillbridge_test
          SECRET_KEY: test-secret-key-not-for-production
        run: python -m app.seed

      - name: run tests
        env:
          ENV: test
          DATABASE_URL: postgresql+asyncpg://skillbridge:skillbridge@localhost:5432/skillbridge_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-not-for-production
        run: pytest --cov=app --cov-report=term-missing -v

      - name: security audit
        run: pip-audit
