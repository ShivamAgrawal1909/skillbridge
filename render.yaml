services:
  - type: web
    name: skillbridge-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: skillbridge-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: ALLOWED_ORIGINS
        value: '["https://skillbridge-frontend.vercel.app"]'

databases:
  - name: skillbridge-db
    databaseName: skillbridge
    user: skillbridge